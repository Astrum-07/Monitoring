<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alem | Enterprise Monitoring</title>
    <link rel="shortcut icon" href="./internet.png" type="image/x-icon">
    
    <!-- Premium Shriftlar va Ikonkalar -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <!-- Kutubxonalar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #f43f5e;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border: #f1f5f9;
            --shadow: 0 10px 15px -3px rgba(0,0,0,0.04);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-dark); min-height: 100vh; overflow-x: hidden; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        #page-loader { position: fixed; inset: 0; background: white; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        header {
            height: 75px; background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(15px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; position: sticky; top: 0; z-index: 1001; border-bottom: 1px solid var(--border);
        }
        .logo { font-weight: 800; font-size: 1.6rem; color: var(--primary); display: flex; align-items: center; gap: 12px; letter-spacing: -1px; }
        .menu-btn { font-size: 1.4rem; cursor: pointer; color: var(--text-dark); display: none; }

        .app-container { display: grid; grid-template-columns: 320px 1fr; gap: 30px; padding: 30px; max-width: 1600px; margin: 0 auto; }

        .sidebar { background: var(--card); border-radius: 24px; padding: 25px; box-shadow: var(--shadow); height: fit-content; position: sticky; top: 105px; transition: 0.4s; }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; z-index: 1500; backdrop-filter: blur(4px); }
        .sidebar-label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; margin: 20px 0 10px 0; letter-spacing: 1px; }
        
        .group-card {
            padding: 16px; border-radius: 18px; border: 1px solid var(--border); margin-bottom: 10px;
            cursor: pointer; transition: 0.3s; background: #fff;
        }
        .group-card.active { background: var(--primary); color: white; border-color: var(--primary); box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3); }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .status-live { background: var(--success); box-shadow: 0 0 8px var(--success); }
        .status-off { background: #d1d5db; }

        .debtors-box { background: #fff1f2; border-radius: 18px; padding: 15px; margin-top: 20px; border: 1px solid #ffe4e6; }
        .debtor-mini { font-size: 0.8rem; margin-bottom: 8px; color: var(--danger); font-weight: 600; display: flex; justify-content: space-between; }

        .card { background: var(--card); border-radius: 28px; padding: 30px; box-shadow: var(--shadow); margin-bottom: 25px; }
        .card-title { font-size: 1.3rem; font-weight: 700; display: flex; align-items: center; gap: 10px; }

        .table-wrap { overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; padding: 15px; color: var(--text-muted); font-size: 0.85rem; border-bottom: 2px solid #f3f4f6; }
        td { padding: 20px 15px; border-bottom: 1px solid #f9fafb; }

        .switch { position: relative; display: inline-block; width: 46px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #d1d5db; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--success); }
        input:checked + .slider:before { transform: translateX(22px); }

        .timeline { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .date-node {
            min-width: 95px; height: 100px; background: white; border-radius: 22px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border: 1px solid var(--border); cursor: pointer; transition: 0.3s;
        }
        .date-node:hover { border-color: var(--primary); transform: translateY(-5px); }

        .btn { padding: 12px 24px; border-radius: 16px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; width: 100%; justify-content: center; margin-top: 25px; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.2); }

        .modal { position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 20px; }
        .modal-content { background: white; width: 95%; max-width: 750px; border-radius: 32px; padding: 35px; animation: slideUp 0.4s ease; overflow-y: auto; max-height: 90vh; }

        .debt-tag { background: #fee2e2; color: var(--danger); padding: 4px 10px; border-radius: 8px; font-size: 0.7rem; font-weight: 800; }

        @media (max-width: 1024px) {
            .app-container { grid-template-columns: 1fr; padding: 20px; }
            .menu-btn { display: block; }
            .sidebar { position: fixed; left: -320px; top: 0; height: 100vh; width: 280px; z-index: 2000; border-radius: 0; }
            .sidebar.active { left: 0; }
            .sidebar-overlay.active { display: block; }
            header { padding: 0 20px; }
        }
    </style>
</head>
<body>

<div id="page-loader">
    <div class="spinner"></div>
    <p style="margin-top: 15px; font-weight: 600;">ALEM yuklanmoqda...</p>
</div>

<div class="sidebar-overlay" id="overlay" onclick="toggleMenu()"></div>

<header>
    <div style="display: flex; align-items: center; gap: 15px;">
        <i class="fas fa-bars menu-btn" onclick="toggleMenu()"></i>
        <div class="logo"><i class="fas fa-globe"></i> ALEM<span>.uz</span></div>
    </div>
    <div id="topDateLabel" style="font-weight: 700; color: var(--text-muted); font-size: 0.85rem;"></div>
</header>

<div class="app-container">
    <aside class="sidebar" id="sidebar">
        <p class="sidebar-label">Guruhlar</p>
        <div id="groupList"></div>

        <div id="debtorsContainer" style="display: none;">
            <p class="sidebar-label">Qarzdorlar (2+ marta)</p>
            <div class="debtors-box" id="debtorsList"></div>
            <button class="btn btn-primary" style="width: 100%; font-size: 0.7rem; margin-top: 10px; padding: 10px;" onclick="exportDebtorsPDF()">
                <i class="fas fa-file-pdf"></i> Ro'yxatni PDF qilish
            </button>
        </div>
    </aside>

    <main>
        <section class="card animate">
            <h3 class="card-title"><i class="fas fa-calendar-check" style="color:var(--primary)"></i> Bugungi Reja</h3>
            <div id="scheduleStatus" style="margin-top: 10px;"></div>
            
            <p class="sidebar-label" style="margin-top: 25px;">Shaxsiy Eslatmalar</p>
            <div id="personalTodoArea"></div>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <input type="text" id="todoInp" placeholder="Yangi eslatma..." style="flex:1; padding:12px; border-radius:12px; border:1px solid #ddd; outline:none;">
                <button class="btn btn-primary" onclick="addPersonalTodo()">+</button>
            </div>
        </section>

        <section class="card animate" id="monArea" style="display:none;">
            <div class="card-header">
                <div>
                    <h2 id="activeGName" style="font-weight: 800; margin-bottom: 5px;">Guruh</h2>
                    <p id="lessonTimeInfo" style="font-size: 0.8rem; color: var(--text-muted);"></p>
                </div>
                <div style="color:var(--success); font-weight:800; font-size:0.75rem;"><i class="fas fa-sync"></i> LIVE CLOUD SYNC</div>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr><th>O'quvchi Ismi</th><th>Uyga Vazifa</th><th>Statistika</th></tr></thead>
                    <tbody id="studentBody"></tbody>
                </table>
            </div>
            <button class="btn btn-success" id="saveBtn" onclick="askLessonNumber()"><i class="fas fa-box-archive"></i> Darsni Yakunlash & Arxivlash</button>
        </section>

        <section class="card animate">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; flex-wrap:wrap; gap:15px;">
                <h3 class="card-title" style="margin:0;"><i class="fas fa-history" style="color:var(--primary)"></i> Arxiv Tarixi</h3>
                <div style="display:flex; gap:10px;">
                    <button class="btn" style="background:var(--danger); color:white; font-size:0.75rem;" onclick="generateTotalArchivePDF()"><i class="fas fa-file-pdf"></i> Jami Tarix PDF</button>
                    <button class="btn" style="background:#16a34a; color:white; font-size:0.75rem;" onclick="exportExcel()"><i class="fas fa-file-excel"></i> Excel Export</button>
                </div>
            </div>
            <div class="timeline" id="timeline"></div>
        </section>
    </main>
</div>

<div class="modal" id="modal" onclick="closeModal(event)">
    <div class="modal-content">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
            <h2 id="modalTitle" style="color:var(--primary); font-weight: 800;">Tafsilotlar</h2>
            <i class="fas fa-times-circle" style="font-size: 1.5rem; cursor:pointer; color:var(--text-muted)" onclick="closeModal(null)"></i>
        </div>
        <div id="modalBody"></div>
    </div>
</div>

<script>
    let GROUPS = JSON.parse(localStorage.getItem('alem_base_groups')) || {}; 
    let archiveDB = JSON.parse(localStorage.getItem('alem_archive_v6')) || {};
    let liveCache = JSON.parse(localStorage.getItem('alem_live_v6')) || {};
    let myTodos = JSON.parse(localStorage.getItem('alem_todos_v6')) || [];
    
    let currentGId = null;
    const now = new Date();
    const todayNum = now.getDay(); 
    const todayStr = now.toISOString().split('T')[0];

    async function bootstrap() {
        try {
            const res = await fetch('students.json');
            if (res.ok) {
                const freshData = await res.json();
                GROUPS = freshData;
                localStorage.setItem('alem_base_groups', JSON.stringify(GROUPS));
            }
        } catch (e) { console.log("JSON yuklanmadi, keshdan o'qiladi."); }

        if (Object.keys(GROUPS).length === 0) {
            document.getElementById('page-loader').innerHTML = `<h3>Xato: Ma'lumotlar topilmadi!</h3>`;
            return;
        }

        checkAndResetDaily();
        initUI();
        setTimeout(() => { document.getElementById('page-loader').style.display = 'none'; }, 500);
    }

    function checkAndResetDaily() {
        const lastSync = localStorage.getItem('alem_last_sync_date');
        if (lastSync !== todayStr) {
            liveCache = {};
            localStorage.setItem('alem_live_v6', JSON.stringify(liveCache));
            localStorage.setItem('alem_last_sync_date', todayStr);
        }
    }

    function initUI() {
        document.getElementById('topDateLabel').innerText = now.toLocaleDateString('uz-UZ', {weekday:'long', day:'numeric', month:'long'});
        renderGroups();
        renderScheduleInfo();
        renderTodoSystem();
        renderTimeline();
        updateDebtorsSidebar();
    }

    function toggleMenu() {
        document.getElementById('sidebar').classList.toggle('active');
        document.getElementById('overlay').classList.toggle('active');
    }

    function renderScheduleInfo() {
        const statusArea = document.getElementById('scheduleStatus');
        let activeToday = Object.keys(GROUPS).filter(id => GROUPS[id].days.includes(todayNum));
        if(activeToday.length > 0) {
            statusArea.innerHTML = `<div style="background:#f0fdf4; padding:15px; border-radius:15px; border-left:5px solid var(--success);"><p style="font-weight:700; color:var(--success);">Bugun ${activeToday.join(', ')} guruhlarida dars bor.</p></div>`;
        } else {
            statusArea.innerHTML = `<p style="color:var(--text-muted);">Bugun rasmiy darslar yo'q.</p>`;
        }
    }

    function renderGroups() {
        const cont = document.getElementById('groupList');
        cont.innerHTML = Object.keys(GROUPS).map(id => {
            const isLessonToday = GROUPS[id].days.includes(todayNum);
            const isArchivedToday = archiveDB[todayStr] && archiveDB[todayStr][id];
            return `
                <div class="group-card ${currentGId === id ? 'active' : ''}" onclick="selectGroup('${id}')">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <b>${id}</b>
                        <span class="status-dot ${isLessonToday ? 'status-live' : 'status-off'}"></span>
                    </div>
                    <span style="font-size:0.75rem; opacity:0.8;">${GROUPS[id].time}</span>
                    <p style="font-size:0.6rem; margin-top:5px; opacity:0.8;">
                        ${isArchivedToday ? '<i class="fas fa-check-circle"></i> ' + archiveDB[todayStr][id].lessonNum : (isLessonToday ? 'Dars kuni' : 'Navbatdan tashqari')}
                    </p>
                </div>`;
        }).join('');
    }

    function selectGroup(id) {
        currentGId = id;
        renderGroups();
        if(window.innerWidth < 1024) toggleMenu();
        document.getElementById('monArea').style.display = 'block';
        document.getElementById('activeGName').innerText = id + " Monitoringi";
        document.getElementById('lessonTimeInfo').innerText = GROUPS[id].time + " | " + GROUPS[id].location;
        const tbody = document.getElementById('studentBody');
        const cache = liveCache[id] || {};
        const isArchivedToday = archiveDB[todayStr] && archiveDB[todayStr][id];
        document.getElementById('saveBtn').innerHTML = isArchivedToday ? '<i class="fas fa-sync"></i> Yangilash' : '<i class="fas fa-box-archive"></i> Saqlash';

        tbody.innerHTML = GROUPS[id].students.map(s => {
            const m = getMissedStat(s, id);
            const val = cache[s] !== undefined ? cache[s] : true;
            return `<tr>
                <td><b>${s}</b> ${m>=2 ? `<br><span class="debt-tag">DIQQAT: ${m} ta</span>` : ''}</td>
                <td><label class="switch"><input type="checkbox" class="st-ch" data-name="${s}" ${val?'checked':''} onchange="syncLive()"> <span class="slider"></span></label></td>
                <td>${m} marta bajarmagan</td>
            </tr>`;
        }).join('');
    }

    function syncLive() {
        if(!currentGId) return;
        if(!liveCache[currentGId]) liveCache[currentGId] = {};
        document.querySelectorAll('.st-ch').forEach(i => { liveCache[currentGId][i.dataset.name] = i.checked; });
        localStorage.setItem('alem_live_v6', JSON.stringify(liveCache));
    }

    async function askLessonNumber() {
        const { value: lessonNo } = await Swal.fire({
            title: 'Dars raqami',
            input: 'text',
            inputPlaceholder: 'Masalan: 12-dars',
            showCancelButton: true,
            confirmButtonColor: '#4f46e5',
            confirmButtonText: 'Saqlash',
            cancelButtonText: 'Bekor qilish'
        });
        if (lessonNo) {
            if(!archiveDB[todayStr]) archiveDB[todayStr] = {};
            archiveDB[todayStr][currentGId] = { results: {...liveCache[currentGId]}, lessonNum: lessonNo };
            localStorage.setItem('alem_archive_v6', JSON.stringify(archiveDB));
            Swal.fire('Saqlandi!', '', 'success');
            renderGroups(); renderTimeline(); updateDebtorsSidebar();
        }
    }

    function getMissedStat(name, gid) {
        let c = 0;
        Object.keys(archiveDB).forEach(d => { 
            if(archiveDB[d][gid] && archiveDB[d][gid].results && archiveDB[d][gid].results[name] === false) c++; 
        });
        return c;
    }

    function renderTodoSystem() {
        const manual = document.getElementById('personalTodoArea');
        manual.innerHTML = myTodos.map((t, i) => `<div class="group-card" style="border-left:5px solid var(--success); display:flex; justify-content:space-between; align-items:center; cursor:default; padding:12px 16px;"><span style="${t.done?'text-decoration:line-through; opacity:0.5':''}">${t.text}</span><div style="display:flex; gap:10px; color:var(--text-muted);"><i class="fas fa-check" style="cursor:pointer" onclick="toggleT(${i})"></i><i class="fas fa-trash" style="cursor:pointer" onclick="delT(${i})"></i></div></div>`).join('');
    }
    function addPersonalTodo() { const inp = document.getElementById('todoInp'); if(inp.value) { myTodos.push({text: inp.value, done: false}); inp.value = ''; saveTodos(); } }
    function toggleT(i) { myTodos[i].done = !myTodos[i].done; saveTodos(); }
    function delT(i) { myTodos.splice(i, 1); saveTodos(); }
    function saveTodos() { localStorage.setItem('alem_todos_v6', JSON.stringify(myTodos)); renderTodoSystem(); }

    function updateDebtorsSidebar() {
        const list = document.getElementById('debtorsList');
        const box = document.getElementById('debtorsContainer');
        let debtors = [];
        Object.keys(GROUPS).forEach(gid => { GROUPS[gid].students.forEach(s => { const m = getMissedStat(s, gid); if(m >= 2) debtors.push({ name: s, group: gid, count: m }); }); });
        if(debtors.length > 0) { box.style.display = 'block'; list.innerHTML = debtors.map(d => `<div class="debtor-mini"><span>${d.name} (${d.group})</span><span>${d.count} ta</span></div>`).join(''); }
        else { box.style.display = 'none'; }
    }

    function renderTimeline() {
        const cont = document.getElementById('timeline');
        cont.innerHTML = Object.keys(archiveDB).sort().reverse().map(date => {
            const d = new Date(date);
            return `<div class="date-node" onclick="openArchiveModal('${date}')"><span>${d.toLocaleDateString('uz-UZ',{month:'short'})}</span><b>${d.getDate()}</b><span>${d.toLocaleDateString('uz-UZ',{weekday:'short'})}</span></div>`;
        }).join('');
    }

    function openArchiveModal(date) {
        document.getElementById('modal').style.display = 'flex';
        const body = document.getElementById('modalBody');
        document.getElementById('modalTitle').innerText = date;
        let h = "";
        Object.keys(archiveDB[date]).forEach(gid => {
            h += `<div style="background:#f8fafc; padding:20px; border-radius:20px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; border: 1px solid #ddd;">
                <div><b>${gid}</b><br><small style="color:var(--primary)">${archiveDB[date][gid].lessonNum}</small></div>
                <button class="btn" style="background:#1e293b; color:white; font-size:0.75rem;" onclick="generateAlemPDF('${date}', '${gid}')"><i class="fas fa-file-pdf"></i> PDF</button>
            </div>`;
        });
        body.innerHTML = h;
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    // --- PDF ENGINE (MODERN & CLEAN) ---
    function generateAlemPDF(date, gid) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        const data = archiveDB[date][gid];
        
        // Elegant Header
        doc.setFillColor(79, 70, 229);
        doc.rect(0, 0, 210, 35, 'F');
        doc.setTextColor(255, 255, 255);
        doc.setFontSize(26);
        doc.setFont("helvetica", "bold");
        doc.text("ALEM", 15, 22);
        doc.setFontSize(12);
        doc.setFont("helvetica", "normal");
        doc.text(`Sana: ${date}`, 195, 22, { align: "right" });

        // Content
        doc.setTextColor(31, 41, 55);
        doc.setFontSize(18);
        doc.setFont("helvetica", "bold");
        doc.text(`${gid} - ${data.lessonNum}`, 15, 52);

        const tableData = Object.entries(data.results).map(([n, s]) => [n, s ? "Bajarilgan" : "Bajarmagan"]);
        doc.autoTable({
            startY: 62,
            head: [['O\'quvchi Ismi', 'Uyga Vazifa Holati']],
            body: tableData,
            theme: 'grid',
            headStyles: { fillColor: [79, 70, 229], fontStyle: 'bold' },
            styles: { font: "helvetica", fontSize: 10 },
            columnStyles: { 1: { halign: 'center', fontStyle: 'bold' } },
            didParseCell: (d) => {
                if(d.section === 'body' && d.column.index === 1) {
                    d.cell.styles.textColor = d.cell.raw === 'Bajarilgan' ? [16, 185, 129] : [244, 63, 94];
                }
            }
        });
        doc.save(`Alem_${gid}_${date}.pdf`);
    }

    function generateTotalArchivePDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        let y = 20;
        doc.setFontSize(22); doc.text("Alem: Jami Tarixiy Arxiv", 15, y); y += 15;
        Object.keys(archiveDB).sort().reverse().forEach(date => {
            if (y > 250) { doc.addPage(); y = 20; }
            doc.setFillColor(31, 41, 55); doc.rect(15, y, 180, 10, 'F'); doc.setTextColor(255, 255, 255); doc.setFontSize(11); doc.text(`Sana: ${date}`, 20, y + 7); y += 18;
            Object.keys(archiveDB[date]).forEach(gid => {
                const item = archiveDB[date][gid];
                doc.setTextColor(79, 70, 229); doc.text(`Guruh: ${gid} (${item.lessonNum})`, 15, y);
                const tableData = Object.entries(item.results).map(([n, s]) => [n, s ? "Ha" : "Yo'q"]);
                doc.autoTable({ startY: y + 2, head: [['Ism', 'Bajardi']], body: tableData, margin: {left: 15}, didParseCell: (d) => { if(d.section === 'body' && d.column.index === 1) d.cell.styles.textColor = d.cell.raw === 'Ha' ? [16, 185, 129] : [244, 63, 94]; } });
                y = doc.lastAutoTable.finalY + 10;
            });
        });
        doc.save("Alem_Jami_Arxiv.pdf");
    }

    function exportDebtorsPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFontSize(20); doc.text("Vazifa bajarmaganlar (2+ marta)", 15, 20);
        let debtors = [];
        Object.keys(GROUPS).forEach(gid => { GROUPS[gid].students.forEach(s => { const m = getMissedStat(s, gid); if(m >= 2) debtors.push([gid, s, m + " ta"]); }); });
        doc.autoTable({ startY: 30, head: [['Guruh', 'O\'quvchi', 'Soni']], body: debtors });
        doc.save("Alem_Qarzdorlar.pdf");
    }

    function exportExcel() {
        const data = [];
        Object.keys(archiveDB).forEach(d => { Object.keys(archiveDB[d]).forEach(g => { Object.entries(archiveDB[d][g].results).forEach(([s, st]) => { data.push({"Sana": d, "Guruh": g, "Dars": archiveDB[d][g].lessonNum, "O'quvchi": s, "Holati": st ? "Bajardi" : "Bajarmadi"}); }); }); });
        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Arxiv"); XLSX.writeFile(wb, "Alem_Archive.xlsx");
    }

    bootstrap();
</script>
